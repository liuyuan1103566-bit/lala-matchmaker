<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taim. 拉拉红娘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --purple:#7B6CF6;--blue:#5B9BD5;--pink:#FF8FAB;
  --gold:#F4A835;--gold2:#F9C55A;
  --dark:#2D2A5E;--mid:#4A4780;--soft:#7B78A8;--pale:#B0ADDA;
  --bg:#EEF0FF;--card:rgba(255,255,255,0.85);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--dark);overscroll-behavior:none}

/* BG */
.bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(160deg,#e8e8ff 0%,#d4c5f5 40%,#c5d8f5 70%,#dce8ff 100%)}
.orb{position:fixed;border-radius:50%;filter:blur(70px);z-index:-1;pointer-events:none}
.orb1{width:400px;height:400px;background:rgba(160,120,255,0.15);top:-100px;right:-80px}
.orb2{width:350px;height:350px;background:rgba(100,160,255,0.12);bottom:-80px;left:-80px}
.orb3{width:200px;height:200px;background:rgba(244,168,53,0.1);top:50%;left:50%;transform:translate(-50%,-50%)}

/* CARD STACK — the main layout */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .35s cubic-bezier(.4,0,.2,1)}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(40px)}
.screen.slide-out{opacity:0;transform:translateY(-40px)}

/* NAV */
.nav{padding:14px 20px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(123,108,246,0.1);flex-shrink:0}
.nav-logo{font-size:19px;font-weight:900;background:linear-gradient(90deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.nav-right{margin-left:auto;display:flex;gap:8px}
.nav-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(123,108,246,0.25);background:rgba(255,255,255,0.7);color:var(--purple)}

/* GOLDEN RETRIEVER SVG */
.dog-wrap{display:flex;justify-content:center;margin:0 auto 4px}

/* LANDING */
.landing-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 28px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;background:rgba(244,168,53,0.12);border:1px solid rgba(244,168,53,0.3);font-size:12px;font-weight:600;color:#C4820A;margin-bottom:20px}
.landing-title{font-size:clamp(30px,7vw,52px);font-weight:900;line-height:1.2;text-align:center;margin-bottom:12px;background:linear-gradient(135deg,#3D2A8A,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-sub{font-size:15px;color:var(--soft);line-height:1.8;text-align:center;max-width:340px;margin-bottom:32px}
.cta-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:15px 24px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;box-shadow:0 8px 24px rgba(123,108,246,0.3)}
.btn-primary:active{transform:scale(0.97)}
.btn-outline{background:rgba(255,255,255,0.8);color:var(--purple);border:1.5px solid rgba(123,108,246,0.25)}
.btn-outline:active{background:rgba(123,108,246,0.08)}
.stats{display:flex;gap:28px;margin-top:28px;justify-content:center}
.stat-num{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:11px;color:var(--pale);margin-top:2px}

/* QUIZ SCREEN */
.quiz-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.progress-bar-wrap{padding:12px 20px 8px;flex-shrink:0}
.prog-track{height:5px;background:rgba(123,108,246,0.12);border-radius:3px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .4s}
.prog-label{font-size:12px;color:var(--pale);text-align:right;margin-top:5px}

/* CARD SWIPE AREA */
.cards-area{flex:1;position:relative;overflow:hidden;padding:10px 20px 0}
.q-card{
  position:absolute;inset:0;margin:0 auto;max-width:440px;width:100%;
  background:var(--card);backdrop-filter:blur(20px);border-radius:24px;
  border:1px solid rgba(255,255,255,0.9);
  box-shadow:0 12px 40px rgba(123,108,246,0.12),inset 0 1px 0 rgba(255,255,255,0.9);
  padding:28px 22px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s;
  display:flex;flex-direction:column;
}
.q-card.next{transform:translateX(100%);opacity:0}
.q-card.prev{transform:translateX(-100%);opacity:0}
.q-card.active{transform:translateX(0);opacity:1}

.step-tag{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.section-title{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:2px}
.section-sub{font-size:13px;color:var(--soft);margin-bottom:18px}

.q-label{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:10px;line-height:1.6}
.q-note{font-size:12px;color:var(--pale);margin-bottom:8px}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:13px;border:1.5px solid rgba(123,108,246,0.15);cursor:pointer;font-size:14px;color:var(--mid);background:rgba(255,255,255,0.5);transition:all .15s;text-align:left}
.opt:active{transform:scale(0.98)}
.opt.sel{border-color:var(--purple);background:rgba(123,108,246,0.1);color:var(--dark);font-weight:600}
.opt input{display:none}
.opt-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(123,108,246,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.sel .opt-dot{background:var(--purple);border-color:var(--purple)}
.opt.sel .opt-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:7px 14px;border-radius:20px;border:1.5px solid rgba(123,108,246,0.18);font-size:13px;cursor:pointer;color:var(--soft);background:rgba(255,255,255,0.6);transition:all .15s}
.tag.sel{border-color:var(--purple);background:rgba(123,108,246,0.12);color:var(--purple);font-weight:600}

/* INPUTS */
input[type=text],input[type=number],textarea{
  width:100%;border:1.5px solid rgba(123,108,246,0.18);border-radius:12px;
  padding:11px 14px;font-size:14px;outline:none;font-family:inherit;
  background:rgba(255,255,255,0.7);color:var(--dark)
}
input:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,108,246,0.1)}
textarea{resize:none;min-height:70px}
.input-row{display:flex;gap:8px}
.input-row input{flex:1}

/* BOTTOM NAV */
.bottom-nav{padding:12px 20px 20px;display:flex;gap:10px;flex-shrink:0;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px)}
.bottom-nav .btn{flex:1;padding:13px}
.btn-back{flex:0 0 50px!important;background:rgba(255,255,255,0.8);border:1.5px solid rgba(123,108,246,0.2);color:var(--purple);border-radius:16px;font-size:18px}

/* REPORT SCREEN */
.report-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}
.r-max{max-width:440px;margin:0 auto}

/* hero card */
.hero-card{
  background:linear-gradient(135deg,rgba(123,108,246,0.12),rgba(91,155,213,0.1));
  border:1.5px solid rgba(123,108,246,0.2);border-radius:24px;
  padding:28px 20px;text-align:center;margin-bottom:12px;
  box-shadow:0 8px 32px rgba(123,108,246,0.1);
}
.hero-animal{font-size:52px;margin-bottom:6px}
.hero-name{font-size:20px;font-weight:800;color:var(--dark);margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--soft)}
.hero-animal-desc{font-size:13px;color:var(--mid);line-height:1.7;margin-top:12px;padding:10px 14px;background:rgba(123,108,246,0.06);border-radius:12px;text-align:left}

/* section cards */
.r-card{background:rgba(255,255,255,0.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.9);border-radius:20px;box-shadow:0 6px 24px rgba(123,108,246,0.09);padding:18px;margin-bottom:10px}
.r-title{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.r-icon{font-size:17px}
.r-body{font-size:14px;color:var(--mid);line-height:1.8}

/* items */
.items{display:flex;flex-direction:column;gap:7px}
.item{padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.7;color:var(--dark)}
.item strong{color:var(--dark)}
.item-p{background:rgba(123,108,246,0.07);border-left:3px solid var(--purple)}
.item-b{background:rgba(91,155,213,0.08);border-left:3px solid var(--blue)}
.item-y{background:rgba(244,168,53,0.08);border-left:3px solid var(--gold)}
.item-pk{background:rgba(255,143,171,0.08);border-left:3px solid var(--pink)}
.item-r{background:rgba(220,53,69,0.06);border-left:3px solid #DC3545}

/* places */
.places{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.place{padding:5px 12px;border-radius:10px;font-size:12px;background:rgba(91,155,213,0.1);border:1px solid rgba(91,155,213,0.22);color:#3A7CB8;font-weight:500}

/* type badge */
.type-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;font-size:13px;font-weight:700;margin-bottom:10px}

/* DANGER */
.danger-box{padding:14px;background:rgba(220,53,69,0.05);border:1.5px solid rgba(220,53,69,0.15);border-radius:14px;margin-bottom:10px}
.danger-name{font-size:15px;font-weight:800;color:#C0392B;margin-bottom:6px}
.danger-why{font-size:13px;color:var(--mid);line-height:1.7}
.signal-label{font-size:12px;font-weight:700;color:var(--dark);margin:10px 0 6px}

/* SCORE RING */
.score-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:14px}
.score-ring{position:relative;width:100px;height:100px}
.score-ring svg{transform:rotate(-90deg)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stars{font-size:18px;margin-bottom:6px}
.rec-tag{display:inline-block;padding:5px 18px;border-radius:20px;font-size:13px;font-weight:700}
.rec-strong{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff}
.rec-ok{background:linear-gradient(135deg,#34C78A,#06b6d4);color:#fff}
.rec-caution{background:linear-gradient(135deg,#FFA756,#f59e0b);color:#fff}
.rec-no{background:rgba(123,108,246,0.15);color:var(--purple)}

/* CHAT */
.chat{display:flex;flex-direction:column;gap:8px}
.chat-row-a{display:flex;flex-direction:column;align-items:flex-end}
.chat-row-b{display:flex;flex-direction:column;align-items:flex-start}
.chat-who{font-size:11px;color:var(--pale);margin-bottom:2px}
.chat-msg{max-width:80%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.6}
.chat-a{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border-bottom-right-radius:4px}
.chat-b{background:rgba(255,255,255,0.85);color:var(--mid);border-bottom-left-radius:4px;border:1px solid rgba(123,108,246,0.1)}

/* DIM GRID */
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dim-card{background:rgba(255,255,255,0.6);border-radius:12px;padding:12px;border:1px solid rgba(123,108,246,0.1)}
.dim-name{font-size:10px;color:var(--pale);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.dim-val{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dim-bar{height:3px;background:rgba(123,108,246,0.1);border-radius:2px;margin:6px 0}
.dim-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--blue))}
.dim-note{font-size:11px;color:var(--soft);line-height:1.5}

/* PORTRAIT */
.p-block{margin-bottom:12px}
.p-lbl{font-size:10px;font-weight:700;color:var(--purple);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.p-text{font-size:14px;color:var(--mid);line-height:1.8}

/* ADMIN */
.admin-body{flex:1;overflow-y:auto;padding:16px 16px 100px}
.admin-max{max-width:440px;margin:0 auto}
.admin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.admin-ttl{font-size:20px;font-weight:800;color:var(--dark)}
.pair-panel{background:rgba(255,255,255,0.8);border-radius:18px;padding:16px;text-align:center;margin-bottom:12px;border:1px solid rgba(123,108,246,0.12)}
.pair-disp{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pair-tag{padding:4px 14px;border-radius:12px;font-size:13px;font-weight:700}
.pair-a{background:rgba(123,108,246,0.12);color:var(--purple);border:1px solid rgba(123,108,246,0.2)}
.pair-b{background:rgba(91,155,213,0.12);color:var(--blue);border:1px solid rgba(91,155,213,0.2)}
.u-card{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;background:rgba(255,255,255,0.8);border:1.5px solid rgba(123,108,246,0.1);border-radius:16px;cursor:pointer;transition:all .2s}
.u-card.sel-a{border-color:var(--purple);background:rgba(123,108,246,0.08)}
.u-card.sel-b{border-color:var(--blue);background:rgba(91,155,213,0.08)}
.u-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.u-name{font-weight:700;font-size:14px;color:var(--dark)}
.u-meta{font-size:12px;color:var(--pale);margin-top:2px}
.bdg{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:700;margin-left:5px}
.bdg-a{background:rgba(123,108,246,0.15);color:var(--purple)}
.bdg-b{background:rgba(91,155,213,0.15);color:var(--blue)}

/* FLOATING BAR */
.float-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;white-space:nowrap;
  background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;
  padding:13px 26px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 28px rgba(123,108,246,0.4);border:none}

@media(min-width:480px){.q-card,.r-max,.admin-max{left:50%;right:auto;transform:translateX(-50%);width:100%;max-width:440px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- NAV (shared) -->
<div id="global-nav" style="position:fixed;top:0;left:0;right:0;z-index:100">
  <div class="nav">
    <div class="dog-wrap">
      <svg width="30" height="28" viewBox="0 0 30 28" fill="none">
        <ellipse cx="15" cy="19" rx="11" ry="7.5" fill="#F4A835"/>
        <ellipse cx="15" cy="19" rx="8.5" ry="5.5" fill="#F9C55A"/>
        <ellipse cx="6.5" cy="14" rx="4.5" ry="6" fill="#E8921A" transform="rotate(-18 6.5 14)"/>
        <ellipse cx="23.5" cy="14" rx="4.5" ry="6" fill="#E8921A" transform="rotate(18 23.5 14)"/>
        <ellipse cx="15" cy="11.5" rx="7.5" ry="7" fill="#F9C55A"/>
        <ellipse cx="11.5" cy="10.5" rx="2" ry="2.2" fill="#3D2A0A"/>
        <ellipse cx="18.5" cy="10.5" rx="2" ry="2.2" fill="#3D2A0A"/>
        <circle cx="12" cy="9.8" r="0.8" fill="white"/>
        <circle cx="19" cy="9.8" r="0.8" fill="white"/>
        <ellipse cx="15" cy="14" rx="2.2" ry="1.5" fill="#3D2A0A"/>
        <ellipse cx="10" cy="13.5" rx="2.2" ry="1.3" fill="#FF8FAB" opacity="0.5"/>
        <ellipse cx="20" cy="13.5" rx="2.2" ry="1.3" fill="#FF8FAB" opacity="0.5"/>
        <ellipse cx="15" cy="16.5" rx="2.2" ry="1.8" fill="#FF8FAB"/>
      </svg>
    </div>
    <div class="nav-logo">Taim.</div>
    <div class="nav-right">
      <button class="nav-btn" onclick="showReport()">我的报告</button>
      <button class="nav-btn" onclick="showAdmin()">后台</button>
    </div>
  </div>
</div>

<!-- ===== LANDING ===== -->
<div class="screen" id="sc-landing" style="padding-top:60px">
  <div class="landing-body">
    <div class="badge">🐾 心理学驱动的拉拉红娘</div>
    <!-- 金毛大图 -->
    <div style="margin-bottom:16px">
      <svg width="140" height="130" viewBox="0 0 140 130" fill="none">
        <!-- 身体 -->
        <ellipse cx="70" cy="90" rx="48" ry="35" fill="#F4A835"/>
        <ellipse cx="70" cy="90" rx="38" ry="27" fill="#F9C55A"/>
        <!-- 左耳 -->
        <ellipse cx="28" cy="55" rx="18" ry="26" fill="#E8921A" transform="rotate(-15 28 55)"/>
        <ellipse cx="28" cy="55" rx="12" ry="18" fill="#F4A835" transform="rotate(-15 28 55)"/>
        <!-- 右耳 -->
        <ellipse cx="112" cy="55" rx="18" ry="26" fill="#E8921A" transform="rotate(15 112 55)"/>
        <ellipse cx="112" cy="55" rx="12" ry="18" fill="#F4A835" transform="rotate(15 112 55)"/>
        <!-- 头 -->
        <ellipse cx="70" cy="50" rx="36" ry="34" fill="#F9C55A"/>
        <ellipse cx="70" cy="50" rx="32" ry="30" fill="#FBD678"/>
        <!-- 眼睛 -->
        <ellipse cx="53" cy="44" rx="8" ry="9" fill="white"/>
        <ellipse cx="87" cy="44" rx="8" ry="9" fill="white"/>
        <ellipse cx="55" cy="46" rx="5.5" ry="6.5" fill="#3D2A0A"/>
        <ellipse cx="89" cy="46" rx="5.5" ry="6.5" fill="#3D2A0A"/>
        <ellipse cx="56" cy="43" rx="2" ry="2.5" fill="white"/>
        <ellipse cx="90" cy="43" rx="2" ry="2.5" fill="white"/>
        <!-- 鼻子 -->
        <ellipse cx="70" cy="62" rx="9" ry="6" fill="#3D2A0A"/>
        <ellipse cx="67" cy="60" rx="3" ry="2" fill="#5D4433" opacity="0.4"/>
        <!-- 嘴 -->
        <path d="M62 70 Q70 78 78 70" stroke="#3D2A0A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- 舌头 -->
        <ellipse cx="70" cy="74" rx="8" ry="7" fill="#FF8FAB"/>
        <ellipse cx="70" cy="78" rx="4" ry="3" fill="#E8709A"/>
        <!-- 腮红 -->
        <ellipse cx="36" cy="60" rx="10" ry="6" fill="#FF8FAB" opacity="0.35"/>
        <ellipse cx="104" cy="60" rx="10" ry="6" fill="#FF8FAB" opacity="0.35"/>
        <!-- 前爪 -->
        <ellipse cx="45" cy="115" rx="15" ry="10" fill="#F4A835"/>
        <ellipse cx="95" cy="115" rx="15" ry="10" fill="#F4A835"/>
        <!-- 爪垫 -->
        <ellipse cx="45" cy="117" rx="8" ry="5" fill="#E8921A"/>
        <ellipse cx="95" cy="117" rx="8" ry="5" fill="#E8921A"/>
        <!-- 尾巴（右侧弯曲） -->
        <path d="M118 85 C135 70 140 50 128 40" stroke="#F4A835" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M118 85 C135 70 140 50 128 40" stroke="#F9C55A" stroke-width="7" stroke-linecap="round" fill="none"/>
        <!-- 颈毛 -->
        <ellipse cx="70" cy="78" rx="22" ry="10" fill="#F4A835" opacity="0.6"/>
      </svg>

function startQuiz(){
  cardIdx=0;
  formData={};
  renderCards();
  showScreen('sc-quiz');
}

function renderCards(){
  var area=document.getElementById('cards-area');
  area.innerHTML='';
  STEPS.forEach(function(step,si){
    var card=document.createElement('div');
    card.className='q-card '+(si===0?'active':si<0?'prev':'next');
    card.id='card-'+si;
    var html='<div class="step-tag">'+step.num+'</div>';
    html+='<div class="section-title">'+step.title+'</div>';
    html+='<div class="section-sub">'+step.sub+'</div>';
    step.questions.forEach(function(q){
      html+='<div style="margin-bottom:18px">';
      html+='<div class="q-label">'+q.label+'</div>';
      if(q.note) html+='<div class="q-note">'+q.note+'</div>';
      if(q.type==='text'||q.type==='number'){
        html+='<input type="'+(q.type==='number'?'number':'text')+'" id="'+q.id+'" placeholder="'+(q.ph||'')+'">';
      } else if(q.type==='textarea'){
        html+='<textarea id="'+q.id+'" placeholder="'+(q.ph||'')+'"></textarea>';
      } else if(q.type==='range'){
        html+='<div class="input-row"><input type="number" id="'+q.id+'min" placeholder="'+(q.ph1||'最小')+'"><input type="number" id="'+q.id+'max" placeholder="'+(q.ph2||'最大')+'"></div>';
      } else if(q.type==='radio'){
        html+='<div class="opts">';
        q.opts.forEach(function(o){
          var val=o.split('：')[0].split('（')[0].trim();
          if(q.opts.indexOf(o)===0&&q.id==='q4') val=o;
          if(['T','P','H（不偏向）','其他','不限'].indexOf(o)>-1) val=o;
          // simpler: use full text as value
          html+='<div class="opt" data-qid="'+q.id+'" data-val="'+o+'" onclick="pickOpt(this)"><div class="opt-dot"></div><span>'+o+'</span></div>';
        });
        html+='</div>';
      } else if(q.type==='tags'||q.type==='tags-text'){
        html+='<div class="tags" id="tags-'+q.id+'">';
        (q.tags||[]).forEach(function(t){
          html+='<div class="tag" data-qid="'+q.id+'" data-lim="'+(q.limit||99)+'" data-val="'+t+'" onclick="pickTag(this)">'+t+'</div>';
        });
        html+='</div>';
        if(q.type==='tags-text') html+='<textarea id="'+q.id+'-text" placeholder="'+(q.ph||'')+'" style="margin-top:10px"></textarea>';
      }
      html+='</div>';
    });
    card.innerHTML=html;
    area.appendChild(card);
  });
  updateProgress();
}

function pickOpt(el){
  var qid=el.dataset.qid;
  document.querySelectorAll('.opt[data-qid="'+qid+'"]').forEach(function(o){ o.classList.remove('sel') });
  el.classList.add('sel');
}
function pickTag(el){
  var qid=el.dataset.qid, lim=parseInt(el.dataset.lim||99);
  if(el.classList.contains('sel')){ el.classList.remove('sel'); return; }
  var sel=document.querySelectorAll('.tag[data-qid="'+qid+'"].sel').length;
  if(sel>=lim){ alert('最多选'+lim+'项'); return; }
  el.classList.add('sel');
}

function collectCard(idx){
  var step=STEPS[idx];
  step.questions.forEach(function(q){
    if(q.type==='text'||q.type==='number'){
      var el=document.getElementById(q.id); if(el) formData[q.id]=el.value.trim();
    } else if(q.type==='textarea'){
      var el=document.getElementById(q.id); if(el) formData[q.id]=el.value.trim();
    } else if(q.type==='range'){
      var mn=document.getElementById(q.id+'min'), mx=document.getElementById(q.id+'max');
      if(mn) formData[q.id+'min']=mn.value;
      if(mx) formData[q.id+'max']=mx.value;
    } else if(q.type==='radio'){
      var sel=document.querySelector('.opt[data-qid="'+q.id+'"].sel');
      formData[q.id]=sel?sel.dataset.val:'';
    } else if(q.type==='tags'||q.type==='tags-text'){
      var vals=[];
      document.querySelectorAll('.tag[data-qid="'+q.id+'"].sel').forEach(function(t){ vals.push(t.dataset.val) });
      formData[q.id]=vals;
      if(q.type==='tags-text'){
        var tx=document.getElementById(q.id+'-text'); if(tx) formData[q.id+'-text']=tx.value.trim();
      }
    }
  });
}

function nextCard(){
  collectCard(cardIdx);
  if(cardIdx>=STEPS.length-1){ submitQuiz(); return; }
  var cur=document.getElementById('card-'+cardIdx);
  cur.classList.remove('active'); cur.classList.add('prev');
  cardIdx++;
  var next=document.getElementById('card-'+cardIdx);
  next.classList.remove('next'); next.classList.add('active');
  document.querySelector('.cards-area').scrollTop=0;
  updateProgress();
  restoreCard(cardIdx);
}
function prevCard(){
  if(cardIdx===0){ showLanding(); return; }
  collectCard(cardIdx);
  var cur=document.getElementById('card-'+cardIdx);
  cur.classList.remove('active'); cur.classList.add('next');
  cardIdx--;
  var prev=document.getElementById('card-'+cardIdx);
  prev.classList.remove('prev'); prev.classList.add('active');
  document.querySelector('.cards-area').scrollTop=0;
  updateProgress();
  restoreCard(cardIdx);
}
function restoreCard(idx){
  // restore formData back into DOM
  var step=STEPS[idx];
  step.questions.forEach(function(q){
    if(q.type==='text'||q.type==='number'){
      var el=document.getElementById(q.id); if(el&&formData[q.id]) el.value=formData[q.id];
    } else if(q.type==='textarea'){
      var el=document.getElementById(q.id); if(el&&formData[q.id]) el.value=formData[q.id];
    } else if(q.type==='range'){
      var mn=document.getElementById(q.id+'min'), mx=document.getElementById(q.id+'max');
      if(mn&&formData[q.id+'min']) mn.value=formData[q.id+'min'];
      if(mx&&formData[q.id+'max']) mx.value=formData[q.id+'max'];
    } else if(q.type==='radio'){
      if(formData[q.id]){
        document.querySelectorAll('.opt[data-qid="'+q.id+'"]').forEach(function(o){
          if(o.dataset.val===formData[q.id]) o.classList.add('sel'); else o.classList.remove('sel');
        });
      }
    } else if(q.type==='tags'||q.type==='tags-text'){
      if(formData[q.id]){
        document.querySelectorAll('.tag[data-qid="'+q.id+'"]').forEach(function(t){
          if(formData[q.id].indexOf(t.dataset.val)>-1) t.classList.add('sel'); else t.classList.remove('sel');
        });
      }
      if(q.type==='tags-text'){
        var tx=document.getElementById(q.id+'-text'); if(tx&&formData[q.id+'-text']) tx.value=formData[q.id+'-text'];
      }
    }
  });
}
function updateProgress(){
  var pct=Math.round((cardIdx+1)/STEPS.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='第 '+(cardIdx+1)+' 步 / 共 '+STEPS.length+' 步';
  document.getElementById('btn-next').textContent=cardIdx>=STEPS.length-1?'提交并查看报告 ✨':'继续 →';
}
function submitQuiz(){
  collectCard(cardIdx);
  if(!formData.q1){ alert('请填写昵称'); return; }
  var u=Object.assign({id:Date.now().toString(),submittedAt:new Date().toISOString()},formData);
  var db=getDB(); db.push(u); saveDB(db);
  lastUser=u;
  renderReport(u);
  showScreen('sc-report');
}

  if(u.q34b&&u.q34b.indexOf('默默承受')>-1) avo+=0.5;
  if(u.q35b&&u.q35b.indexOf('担心失去')>-1) anx+=1.5;

  if(u.q35b&&u.q35b.indexOf('不自在')>-1) avo+=2;
  if(u.q35b&&u.q35b.indexOf('又想靠近又想逃')>-1){ fear+=2; anx+=0.5; avo+=0.5; }
  if(fear>=3) return '恐惧型';
  if(anx>=5) return '焦虑型';
  if(avo>=4) return '回避型';
  if(anx>=3&&anx>avo) return '焦虑倾向';
  if(avo>=2.5&&avo>anx) return '回避倾向';
  return '安全型';
}

  var stateWarn=u.q38&&u.q38.indexOf('3个月')>-1?'<div style="margin-top:10px;padding:10px 13px;background:rgba(244,168,53,0.08);border:1.5px solid rgba(244,168,53,0.2);border-radius:11px;font-size:13px;color:#B8780A"><strong>注意：</strong>你的上段关系结束不足3个月。这个阶段大脑容易用新关系填补空缺。建议先观察自己的状态，不急于确认关系。</div>':'';
  html+=`<div class="r-card">
    <div class="r-title"><span class="r-icon">⚡</span>你现在的状态</div>
    <div class="r-body">${stateDesc(u.q37)}</div>
    ${stateWarn}
  </div>`;

  // 5. 你最需要的
  html+=`<div class="r-card">
    <div class="r-title"><span class="r-icon">💡</span>你在关系里最需要的</div>
    <div class="r-body">${needDesc(u.q41)}</div>
  </div>`;

  // 6. 在关系里的样子
  var expDesc=function(v){if(!v)return'你有自己独特的表达方式。';if(v.indexOf('直接说出来')>-1)return'<strong>直接表达型</strong> — 你会直接说出来，不绕弯子。对方不需要猜你的意思，这是情感上很成熟的行为。';if(v.indexOf('多接触')>-1)return'<strong>渐进式表达型</strong> — 你会多创造机会，等感情自然发展。温和有效，但有时对方可能读不到信号，需要适时说清楚。';if(v.indexOf('等对方先')>-1)return'<strong>确认后表达型</strong> — 你需要先确认安全，再打开自己。你在关系里有一定的自我保护机制。';return'<strong>行动表达型</strong> — 你用行动照顾对方而不是语言。这很真诚，但语言也同样重要——让对方听到你说出来。';};
  var recDesc=function(v){if(!v)return'你有自己的接受方式。';if(v.indexOf('自然接住')>-1)return'<strong>接受能力健康</strong> — 你能自然地接住对方的爱，这是非常健康的表现。对方在你身边会感到被回应。';if(v.indexOf('不太知道怎么接')>-1)return'<strong>接受能力待开发</strong> — 你能感受到对方的爱，但回应上有些卡顿。这可能让对方感觉付出没有被接住。';if(v.indexOf('不安')>-1)return'<strong>接受时有防御</strong> — 对方表达爱时你会有点不安。这通常来自对亲密的不确定感，需要时间和安全感来慢慢打开。';return'<strong>接受时感到压迫</strong> — 亲密让你感到压力，这是回避型的典型反应。你需要一个给你足够空间的人。';};
  var conflDesc=function(v){if(!v)return'你有自己的冲突处理方式。';if(v.indexOf('当下直接说')>-1)return'<strong>即时处理型</strong> — 当下直接说出来，这是最健康的冲突处理方式之一。';if(v.indexOf('先离开冷静')>-1)return'<strong>冷静后处理型</strong> — 先冷静再谈，理性有效。但记得告诉对方"我需要一点时间，我会回来"，否则她会以为你在消失。';if(v.indexOf('立刻说清楚')>-1)return'<strong>立刻解决型</strong> — 你需要立刻把事情说清楚，等不了。在对方需要冷静时会造成对撞，需要双方都有觉察。';return'<strong>压抑型</strong> — 你会忍下去。短期内平和，但情绪不会消失，只会积累，需要注意。';};
  html+=`<div class="r-card">
    <div class="r-title"><span class="r-icon">🪞</span>在关系里，你是这样的人</div>
    <div class="items">
      <div class="item item-p"><strong>表达爱的方式</strong><br>${expDesc(u.q26)}</div>
      <div class="item item-b"><strong>接受爱的能力</strong><br>${recDesc(u.q27)}</div>
      <div class="item item-y"><strong>冲突处理方式</strong><br>${conflDesc(u.q29)}</div>
      ${u.q36a?'<div class="item item-b"><strong>你的优点（自己说的）</strong><br>'+u.q36a+'</div>':''}
      ${u.q36b?'<div class="item item-y"><strong>你想成长的地方</strong><br>'+u.q36b+'</div>':''}
    </div>
  </div>`;

  // 7. 像你这样的人
  html+=`<div class="r-card">
    <div class="r-title"><span class="r-icon">🌏</span>像你这样的人，在人群里</div>
    <div class="p-block"><div class="p-lbl">依恋类型占比</div>
      <div class="p-text"><strong>${portrait.type}</strong> — ${portrait.pct}</div></div>
    <div class="p-block"><div class="p-lbl">你是哪种人</div>
      <div class="p-text">${portrait.desc}。</div></div>
    <div class="p-block"><div class="p-lbl">你的同类在哪里出没</div>
      <div class="places">${portrait.places.map(p=>'<span class="place">📍 '+p+'</span>').join('')}</div></div>
  </div>`;

  html+=`<div style="text-align:center;padding:20px;font-size:12px;color:var(--pale)">🐾 Taim. 会在3个工作日内与你联系<br>${new Date().toLocaleString()}</div>`;

  document.getElementById('report-content').innerHTML=html;
}

// ===== ADMIN =====
function loadAdmin(){
  var users=getDB(), list=document.getElementById('admin-list');
  if(!users.length){list.innerHTML='<div style="text-align:center;color:var(--pale);padding:40px">还没有用户档案</div>';return;}
  var cols=['#7B6CF6','#5B9BD5','#FF8FAB','#34C78A','#F4A835','#9B6CF6'];
  list.innerHTML=users.map(function(u,i){
    var c=cols[i%cols.length];
    var selA_=selA&&selA.id===u.id, selB_=selB&&selB.id===u.id;
    var cls='u-card'+(selA_?' sel-a':selB_?' sel-b':'');
    var badge=selA_?'<span class="bdg bdg-a">A</span>':selB_?'<span class="bdg bdg-b">B</span>':'';
    return '<div class="'+cls+'" onclick="selUser(\''+u.id+'\')">'+
      '<div class="u-av" style="background:linear-gradient(135deg,'+c+',#3D2A8A)">'+u.q1.slice(0,2)+'</div>'+
      '<div style="flex:1"><div class="u-name">'+u.q1+badge+'</div>'+
      '<div class="u-meta">'+u.q2+'岁 · '+u.q3+' · '+(u.q4||'').split('（')[0]+' · '+getType(u)+'</div></div>'+
      '<div style="font-size:11px;color:var(--pale)">'+new Date(u.submittedAt).toLocaleDateString()+'</div></div>';
  }).join('');
}
function selUser(id){
  var u=getDB().find(function(x){return x.id===id});
  if(!u)return;
  if(selA&&selA.id===id) selA=null;
  else if(selB&&selB.id===id) selB=null;
  else if(!selA) selA=u;
  else if(!selB) selB=u;
  else { selA=u; selB=null; }
  updatePair(); loadAdmin();
}
function updatePair(){
  var el=document.getElementById('pair-disp'), btn=document.getElementById('btn-match');
  if(selA&&selB){
    el.innerHTML='<span class="pair-tag pair-a">'+selA.q1+'</span><span style="font-size:16px">💕</span><span class="pair-tag pair-b">'+selB.q1+'</span>';
    btn.disabled=false;
  } else if(selA){
    el.innerHTML='<span class="pair-tag pair-a">'+selA.q1+'</span><span style="color:var(--pale)"> + 再选一位</span>';
    btn.disabled=true;
  } else {
    el.innerHTML='<span style="color:var(--pale)">还未选择</span>';
    btn.disabled=true;
  }
}

// ===== MATCH =====
function overlap(a,b){if(!a||!b)return 0;return a.filter(function(x){return b.indexOf(x)>-1}).length}
function attScore(ta,tb){
  var m={'安全型+安全型':20,'安全型+焦虑倾向':17,'安全型+回避倾向':16,'安全型+焦虑型':15,'安全型+回避型':14,'安全型+恐惧型':10,
    '焦虑倾向+回避倾向':9,'焦虑倾向+焦虑倾向':8,'回避倾向+回避倾向':9,'焦虑型+焦虑倾向':6,'回避型+回避倾向':7,
    '焦虑型+焦虑型':5,'回避型+回避型':8,'焦虑型+回避型':2,'焦虑倾向+回避型':3,'焦虑型+回避倾向':4,
    '焦虑型+恐惧型':4,'回避型+恐惧型':5,'恐惧型+恐惧型':3,'焦虑倾向+恐惧型':6,'回避倾向+恐惧型':6};
  return m[ta+'+'+tb]||m[tb+'+'+ta]||8;
}
function energyScore(e1,e2){
  if(!e1||!e2) return 6;
  var充=function(e){return e.indexOf('充沛')>-1}, 平=function(e){return e.indexOf('平稳')>-1},
      疲=function(e){return e.indexOf('疲惫')>-1}, 复=function(e){return e.indexOf('恢复')>-1};
  if(充(e1)&&充(e2)) return 10; if(平(e1)&&平(e2)) return 10;
  if((充(e1)&&平(e2))||(平(e1)&&充(e2))) return 9;
  if((充(e1)&&疲(e2))||(疲(e1)&&充(e2))) return 7;
  if(疲(e1)&&疲(e2)) return 4;
  if(复(e1)||复(e2)) return 3;
  return 6;
}
function calcMatch(a,b){
  var ta=getType(a),tb=getType(b),d={};
  var dem=0;
  var sameCity=(a.q11&&a.q11.indexOf('必须同城')>-1)||(b.q11&&b.q11.indexOf('必须同城')>-1);
  dem+=(sameCity?a.q3===b.q3:true)?8:0;
  var attrOk=true;
  if(a.q12&&a.q12!=='不限'&&a.q12!==b.q4) attrOk=false;
  if(b.q12&&b.q12!=='不限'&&b.q12!==a.q4) attrOk=false;
  dem+=attrOk?8:0;
  var ageOk=true;
  if(a.q10min&&a.q10max&&b.q2){var ba=parseInt(b.q2);if(ba<parseInt(a.q10min)||ba>parseInt(a.q10max)) ageOk=false;}
  if(b.q10min&&b.q10max&&a.q2){var aa=parseInt(a.q2);if(aa<parseInt(b.q10min)||aa>parseInt(b.q10max)) ageOk=false;}
  dem+=ageOk?4:0;
  d.dem=dem;

  var life=0;
  life+=Math.min(overlap(a.q16,b.q16)*3,9);
  var wi=['活跃型','混合型','居家型'];
  var ai=wi.findIndex(function(w){return a.q19&&a.q19.indexOf(w)>-1})||0;
  var bi=wi.findIndex(function(w){return b.q19&&b.q19.indexOf(w)>-1})||0;
  if(a.q19===b.q19||!a.q19||!b.q19) life+=6; else if(Math.abs(ai-bi)===1) life+=3;
  var kidsA=a.q22||'',kidsB=b.q22||'';
  if(kidsA===kidsB||kidsA.indexOf('视伴侣')>-1||kidsB.indexOf('视伴侣')>-1) life+=8;
  else if((kidsA.indexOf('想要')>-1&&kidsB.indexOf('不要')>-1)||(kidsA.indexOf('不要')>-1&&kidsB.indexOf('想要')>-1)) life+=0;
  else life+=4;
  life+=Math.min(overlap(a.q18,b.q18)*2,7);
  d.life=life;

  var att=attScore(ta,tb);
  att+=8; // base communication
  att+=a.q25&&b.q25&&a.q25===b.q25?7:3;
  d.att=att;

  var cur=energyScore(a.q37,b.q37);
  var sameIntent=a.q39&&b.q39&&(a.q39===b.q39);
  cur+=sameIntent?5:2;
  d.cur=cur;

  return {total:d.dem+d.life+d.att+d.cur, d:d, ta:ta, tb:tb};
}

function genMatch(){
  if(!selA||!selB){alert('请先选择两位用户');return;}
  var a=selA,b=selB, res=calcMatch(a,b);
  var s=res.total, d=res.d, ta=res.ta, tb=res.tb;
  var stars=s>=80?'★★★★★':s>=65?'★★★★☆':s>=50?'★★★☆☆':s>=35?'★★☆☆☆':'★☆☆☆☆';
  var tagCls=s>=80?'rec-strong':s>=65?'rec-ok':s>=50?'rec-caution':'rec-no';
  var tagTxt=s>=80?'强烈推荐 💕':s>=65?'可以推进 🌿':s>=50?'谨慎尝试 🌙':'暂不建议 ⚠️';
  var portraitB=getPortrait(b);
  var animalA=getAnimal(a), animalB=getAnimal(b);

  var pros=[];
  if(overlap(a.q16,b.q16)>=2) pros.push('生活重心高度重叠（'+overlap(a.q16,b.q16)+'项共同），日常相处不会有方向上的割裂感');
  if(overlap(a.q18,b.q18)>=2) pros.push('共同爱好'+overlap(a.q18,b.q18)+'项，第一次约会有天然话题，不尴尬');
  if(a.q25&&b.q25&&a.q25===b.q25) pros.push('对"关系核心是什么"的理解完全一致：都认为是「'+a.q25+'」');
  if(ta==='安全型'||tb==='安全型') pros.push('其中一人是安全型依恋，能为关系提供稳定的情感基底');
  while(pros.length<3) pros.push('两人都在认真寻找一段有质量的关系，出发点一致');

  var risks=[];
  if(ta==='焦虑型'&&(tb==='回避型'||tb==='回避倾向')) risks.push('⚠️ 焦虑型+回避型是高风险组合：一方越追，另一方越缩，容易陷入追逃循环');
  else if(ta==='回避型'&&(tb==='焦虑型'||tb==='焦虑倾向')) risks.push('⚠️ 回避型+焦虑型是高风险组合：一方越追，另一方越缩，容易陷入追逃循环');
  if((a.q11&&a.q11.indexOf('必须同城')>-1||b.q11&&b.q11.indexOf('必须同城')>-1)&&a.q3!==b.q3) risks.push('⚠️ 其中一方要求必须同城，但两人目前不在同一城市');
  if(!risks.length) risks.push('整体风险可控，主要挑战在于建立初期的信任');
  if(risks.length<2) risks.push('在生活节奏或关系期待上可能存在细微差异，建议早期多沟通');

  var advice=s>=80?'建议这周内安排第一次见面，选一个有话题感的场景（咖啡馆+散步），不需要太正式，自然聊就好。':
    s>=65?'建议先通过3-5次线上深聊建立初步了解，再安排见面。从两人共同的兴趣切入，避免过早聊"关系"本身。':
    s>=50?'可以作为候选，但建议先单独约聊一次，了解彼此的生活状态和沟通方式，再决定是否推进。':
    '目前匹配度偏低，建议暂缓。可以等双方状态更新后重新评估，或先各自聊更合适的人选。';

  function chatHTML(msgs){
    return '<div class="chat">'+msgs.map(function(m){
      var isA=m.who==='a';
      return '<div class="chat-row-'+(isA?'a':'b')+'">'+
        '<div class="chat-who">'+(isA?a.q1:b.q1)+'</div>'+
        '<div class="chat-msg chat-'+(isA?'a':'b')+'">'+m.text+'</div></div>';
    }).join('')+'</div>';
  }

  var chatNorm=[{who:'b',text:'今天见面好开心，你比我想象中更有意思😊'},{who:'a',text:'哈哈我也是，你说的那个问题我一直在想'},{who:'b',text:'真的吗，哪个？'},{who:'a',text:'就是，两个人在一起到底是为了彼此成长还是为了不孤单'},{who:'b',text:'你想通了吗'},{who:'a',text:'没有，所以我想再见你一次继续聊🌿'}];
  var chatConf=[{who:'a',text:'你昨天说好要回我消息的'},{who:'b',text:'我……忘了，不好意思'},{who:'a',text:'不是第一次了'},{who:'b',text:'我最近状态不太好，但我不想每次都要解释'},{who:'a',text:'我只是想知道你还在不在'},{who:'b',text:'在的，只是需要一点自己的时间'},{who:'a',text:'你说需要时间，我说需要回应，我们需要的好像不一样'}];

  var dimInfo={dem:{name:'人口学匹配',max:20},life:{name:'三观生活匹配',max:30},att:{name:'情感模式匹配',max:35},cur:{name:'当前状态匹配',max:15}};

  var html=`
  <div class="hero-card" style="margin-bottom:12px">
    <div style="font-size:28px;margin-bottom:8px">${animalA} 💕 ${animalB}</div>
    <div class="hero-name">${a.q1} &amp; ${b.q1}</div>
    <div class="score-wrap" style="margin-top:14px">
      <div class="score-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(123,108,246,0.12)" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="url(#mg)" stroke-width="8"
            stroke-dasharray="${(s/100*264).toFixed(1)} 264" stroke-linecap="round"/>
          <defs><linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7B6CF6"/><stop offset="100%" stop-color="#5B9BD5"/>
          </linearGradient></defs>
        </svg>
        <div class="score-num">${s}</div>
      </div>
      <div class="stars">${stars}</div>
      <span class="rec-tag ${tagCls}">${tagTxt}</span>
    </div>
  </div>

  <div class="r-card">
    <div class="r-title"><span class="r-icon">🔍</span>${b.q1} 是哪种人</div>
    <div class="p-block"><div class="p-lbl">依恋类型</div>
      <div class="p-text">她是 <strong>${tb}</strong>。${portraitB.pct}</div></div>
    <div class="p-block"><div class="p-lbl">她最可能是哪种人</div>
      <div class="p-text">${portraitB.desc}。</div></div>
  </div>

  <div class="r-card">
    <div class="r-title"><span class="r-icon">✅</span>可行之处</div>
    <div class="items">${pros.map(p=>'<div class="item item-p">'+p+'</div>').join('')}</div>
  </div>
  <div class="r-card">
    <div class="r-title"><span class="r-icon">⚡</span>潜在风险</div>
    <div class="items">${risks.map(r=>'<div class="item item-y">'+r+'</div>').join('')}</div>
  </div>
  <div class="r-card">
    <div class="r-title"><span class="r-icon">🧭</span>建议从何处入手</div>
    <div class="r-body">${advice}</div>
  </div>
  <div class="r-card">
    <div class="r-title"><span class="r-icon">💬</span>模拟相处（第一次见面后）</div>
    ${chatHTML(chatNorm)}
  </div>
  <div class="r-card">
    <div class="r-title"><span class="r-icon">🌪</span>可能出现问题的场景</div>
    ${chatHTML(chatConf)}
  </div>
  <div class="r-card">
    <div class="r-title"><span class="r-icon">📊</span>各维度评分</div>
    <div style="font-size:12px;color:var(--pale);margin-bottom:10px">${a.q1} = <strong style="color:var(--purple)">${ta}</strong> · ${b.q1} = <strong style="color:var(--blue)">${tb}</strong></div>
    <div class="dim-grid">
      ${Object.keys(dimInfo).map(function(k){
        var di=dimInfo[k], pct=Math.round(d[k]/di.max*100);
        return '<div class="dim-card"><div class="dim-name">'+di.name+'</div>'+
          '<div><span class="dim-val">'+d[k]+'</span><span style="font-size:11px;color:var(--pale)"> / '+di.max+'</span></div>'+
          '<div class="dim-bar"><div class="dim-fill" style="width:'+pct+'%"></div></div></div>';
      }).join('')}
    </div>
  </div>
  <div style="text-align:center;padding:16px;font-size:12px;color:var(--pale)">${new Date().toLocaleString()}</div>`;

  document.getElementById('match-content').innerHTML=html;
  showScreen('sc-match');
}
